<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Corteza</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 450px;
      width: 100%;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      text-align: center;
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      text-align: center;
      color: #1d1d1f;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 32px;
      font-size: 15px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      font-size: 15px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      background: #e1e4e8;
      color: #666;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    small {
      display: block;
      color: #666;
      font-size: 13px;
      margin-top: 6px;
    }
    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .link a {
      color: #667eea;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">🔐</div>
      <h1>Reset Your Password</h1>
      <p class="subtitle">Enter a new password for your account</p>

      <div id="message" class="message"></div>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            placeholder="At least 8 characters"
            required
            minlength="8"
          />
          <small>Make it strong! Mix letters, numbers, and symbols</small>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Re-enter your password"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="reset-btn">
          Reset Password
        </button>
      </form>

      <div class="link">
        <a href="/auth/login">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('message').textContent = 'Invalid or missing reset token';
      document.getElementById('message').className = 'message error';
      document.getElementById('message').style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
    }

    function showMessage(text, type = 'error') {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
      messageEl.style.display = 'block';
    }

    async function handleReset(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('reset-btn');

      if (password !== confirmPassword) {
        showMessage('Passwords do not match');
        return;
      }

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const response = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: token,
            password: password
          })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Password reset successful! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = '/auth/login';
          }, 2000);
        } else {
          showMessage(data.error || 'Failed to reset password');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (error) {
        console.error('Reset error:', error);
        showMessage('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
